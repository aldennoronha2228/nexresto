name: Windows Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop app version (for example 1.0.1)"
        required: false
        type: string
      publish:
        description: "Publish release to GitHub"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-windows-desktop:
    runs-on: windows-latest

    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      WIN_CSC_NAME: ${{ secrets.WIN_CSC_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Apply version from tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Replace('desktop-v', '')
          npm version $version --no-git-tag-version
        working-directory: desktop

      - name: Apply version from manual input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version
        working-directory: desktop

      - name: Build installer
        run: npm run dist
        working-directory: desktop

      - name: Package installer as zip + checksum
        shell: pwsh
        working-directory: desktop
        run: |
          $exe = Get-ChildItem -LiteralPath ./dist -File -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe installer found in desktop/dist"
            exit 1
          }

          $zipPath = Join-Path $exe.DirectoryName ($exe.BaseName + '.zip')
          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -LiteralPath $exe.FullName -DestinationPath $zipPath

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $exe.FullName
          $checksumPath = Join-Path $exe.DirectoryName ($exe.Name + '.sha256')
          "{0} *{1}" -f $hash.Hash.ToLowerInvariant(), $exe.Name | Set-Content -LiteralPath $checksumPath -Encoding ASCII

      - name: Determine publish mode
        id: publish_mode
        shell: pwsh
        run: |
          $requestedPublish = $false
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/desktop-v*") {
            $requestedPublish = $true
          }
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.publish }}" -eq "true") {
            $requestedPublish = $true
          }

          $hasGeneric = -not [string]::IsNullOrWhiteSpace("${{ secrets.CSC_LINK }}") -and -not [string]::IsNullOrWhiteSpace("${{ secrets.CSC_KEY_PASSWORD }}")
          $hasWindows = -not [string]::IsNullOrWhiteSpace("${{ secrets.WIN_CSC_LINK }}") -and -not [string]::IsNullOrWhiteSpace("${{ secrets.WIN_CSC_KEY_PASSWORD }}")

          $hasSigning = $hasGeneric -or $hasWindows
          $canPublish = $requestedPublish -and $hasSigning

          "requested_publish=$requestedPublish" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "has_signing=$hasSigning" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "can_publish=$canPublish" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($requestedPublish -and -not $hasSigning) {
            Write-Warning "Publish requested but code-signing secrets are missing. The workflow will upload artifacts and skip release publish."
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexresto-windows-installer
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
            desktop/dist/*.sha256

      - name: Verify installer signature
        if: steps.publish_mode.outputs.can_publish == 'true'
        shell: pwsh
        working-directory: desktop
        run: |
          $expected = "${{ secrets.WIN_CSC_NAME }}"
          if ([string]::IsNullOrWhiteSpace($expected)) {
            $expected = "${{ secrets.CSC_NAME }}"
          }
          ./scripts/verify-windows-signature.ps1 -Path ./dist -ExpectedPublisher $expected

      - name: Publish GitHub release
        if: steps.publish_mode.outputs.can_publish == 'true'
        run: npm run publish
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_CSC_NAME: ${{ secrets.WIN_CSC_NAME }}

      - name: Publish skipped notice
        if: steps.publish_mode.outputs.requested_publish == 'true' && steps.publish_mode.outputs.can_publish != 'true'
        shell: pwsh
        run: |
          Write-Host "Publish was skipped because signing secrets are not configured."
          Write-Host "Artifacts (.exe/.zip/.sha256) are still available in this workflow run."
